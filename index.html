<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Code Scanner</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { color: #e94560; text-align: center; }
        textarea { width: 100%; height: 200px; background: #0f3460; color: #fff; border: 1px solid #533483; padding: 10px; font-family: Consolas; }
        button { background: #e94560; color: #fff; border: none; padding: 12px 30px; font-size: 16px; cursor: pointer; margin: 10px 0; border-radius: 5px; }
        .result { background: #16213e; padding: 15px; margin-top: 15px; border-radius: 8px; }
        .issue { background: #0f3460; border-left: 4px solid #e94560; padding: 10px; margin: 8px 0; }
        .issue.medium { border-left-color: #f0a500; }
        .stats { display: flex; gap: 15px; margin: 10px 0; }
        .stat { background: #16213e; padding: 12px; border-radius: 8px; text-align: center; flex: 1; }
        .stat .num { font-size: 28px; font-weight: bold; color: #e94560; }
        .gci { font-size: 48px; font-weight: bold; text-align: center; padding: 20px; }
        .gci.high { color: #e94560; }
        .gci.medium { color: #f0a500; }
        .gci.low { color: #00b894; }
    </style>
</head>
<body>
    <h1>Code Scanner</h1>
    <textarea id="code" placeholder="Paste Java code here..."></textarea><br>
    <button onclick="scan()">Scan Code</button>
    <div id="result" class="result"></div>

    <script>
        async function scan() {
            const code = document.getElementById('code').value;
            document.getElementById('result').innerHTML = 'Scanning...';
            try {
                const r = await fetch('http://localhost:5000/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });
                const issues = await r.json();
                if (issues.length === 0) {
                    document.getElementById('result').innerHTML = '<p style="color:#00b894">No issues found</p>';
                } else {
                    const high = issues.filter(i => i.severity === 'HIGH').length;
                    const medium = issues.filter(i => i.severity === 'MEDIUM').length;
                    const low = issues.filter(i => i.severity === 'LOW').length;
                    const godClass = issues.find(i => i.ruleId === 'GOD_CLASS');

                    let html = `<div class="stats">
                        <div class="stat"><div class="num">${issues.length}</div>Total</div>
                        <div class="stat"><div class="num" style="color:#e94560">${high}</div>High</div>
                        <div class="stat"><div class="num" style="color:#f0a500">${medium}</div>Medium</div>
                        <div class="stat"><div class="num" style="color:#00b894">${low}</div>Low</div>
                    </div>`;

                    if (godClass) {
                        const gci = godClass.analysisChain?.GCI || 0;
                        const cls = gci >= 0.6 ? 'high' : gci >= 0.3 ? 'medium' : 'low';
                        const label = gci >= 0.6 ? 'Heavy God Class' : gci >= 0.3 ? 'Moderate God Class' : 'Light';
                        html += `<div class="gci ${cls}">GCI: ${gci} - ${label}</div>`;
                    }

                    issues.forEach(i => {
                        const cls = i.severity === 'MEDIUM' ? 'medium' : '';
                        html += `<div class="issue ${cls}"><strong>${i.severity}</strong> [${i.ruleId}] line ${i.lineNumber}: ${i.message}</div>`;
                    });
                    document.getElementById('result').innerHTML = html;
                }
            } catch (e) {
                document.getElementById('result').innerHTML = '<p style="color:#e94560">Error: Is Flask running?</p>';
            }
        }
    </script>
</body>
</html>
